<!DOCTYPE html>
<html>
<head>
  <title>JetX Live Pattern Simulator</title>

  <style>
    body {
      background: #0b0b0b;
      color: white;
      font-family: Arial;
      text-align: center;
    }

    input, button {
      padding: 10px;
      margin: 6px;
      font-size: 14px;
    }

    .range {
      color: #00ff88;
      font-weight: bold;
    }

    .low { color: #00bfff; }
    .med { color: #a020f0; }
    .high { color: #ff4da6; }

    #clock {
      font-size: 18px;
      margin: 10px;
      color: #00ff88;
    }

    .pulse {
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0% { opacity: 1; }
      50% { opacity: 0.4; }
      100% { opacity: 1; }
    }
  </style>
</head>

<body>

<h2>🚀 JetX Live Pattern Simulator</h2>

<div id="clock">--:--</div>

<p>Enter signal → live volatility windows (HH:MM only)</p>

<input type="text" id="time" placeholder="HH:MM (e.g. 12:01)">
<input type="number" id="multiplier" placeholder="Multiplier (e.g. 2.3)" step="0.01">

<br>

<label>
  <input type="checkbox" id="auto"> Auto Refresh (3s)
</label>

<br>

<button onclick="generate()">Generate Now</button>

<div id="result"></div>

<script>

// ---------- LIVE CLOCK (NO SECONDS) ----------
function updateClock(){
  let now = new Date();
  let h = String(now.getHours()).padStart(2,'0');
  let m = String(now.getMinutes()).padStart(2,'0');

  document.getElementById("clock").innerHTML =
    `🕒 Live Time: ${h}:${m}`;
}
setInterval(updateClock, 1000);
updateClock();

// ---------- PARSE ----------
function parseTime(t){
  let [h,m] = t.split(":").map(Number);
  return {h,m};
}

// ---------- FORMAT ----------
function format(h,m){
  if(m >= 60){ h += Math.floor(m/60); m %= 60; }
  if(h >= 24){ h %= 24; }

  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
}

// ---------- VOL ----------
function getVol(v){
  if(v < 2) return "low";
  if(v < 5) return "med";
  return "high";
}

// ---------- RANGE ----------
function makeRange(vol){

  if(vol === "low"){
    return (1 + Math.random()*1.8).toFixed(2) + "x – " +
           (2 + Math.random()*2.5).toFixed(2) + "x";
  }

  if(vol === "med"){
    return (2 + Math.random()*3).toFixed(2) + "x – " +
           (6 + Math.random()*6).toFixed(2) + "x";
  }

  return (4 + Math.random()*8).toFixed(2) + "x – " +
         (15 + Math.random()*35).toFixed(2) + "x";
}

// ---------- COLOR ----------
function color(vol){
  if(vol === "low") return "low";
  if(vol === "med") return "med";
  return "high";
}

// ---------- MAIN ----------
function generate(){

  let t = document.getElementById("time").value;
  let v = parseFloat(document.getElementById("multiplier").value);

  if(!t || isNaN(v)){
    alert("Enter valid time + multiplier");
    return;
  }

  let time = parseTime(t);
  let vol = getVol(v);

  let output = [];

  for(let i=1;i<=5;i++){

    let h = time.h;
    let m = time.m + (i * 2);

    let start = format(h,m);
    let end = format(h, m+2);

    output.push(`
      <p class="${color(vol)} pulse">
        Window ${i}: <b class="range">${makeRange(vol)}</b><br>
        Time: ${start} – ${end}
      </p>
    `);
  }

  document.getElementById("result").innerHTML =
    `<h3>📡 Live JetX Windows</h3>
     <p>Signal: <b>${vol.toUpperCase()}</b></p>
     ${output.join("")}`;
}

// ---------- AUTO REFRESH ----------
setInterval(() => {
  if(document.getElementById("auto").checked){
    generate();
  }
}, 3000);

</script>

</body>
</html>
